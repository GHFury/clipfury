<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ClipFury — My Clips</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Anton&family=Special+Elite&family=Barlow+Condensed:wght@400;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Special Elite', serif;
      background: #f0e6c8;
      color: #111;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: #111;
      border-bottom: 4px solid #C8952A;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title {
      font-family: 'Anton', sans-serif;
      font-style: italic;
      color: #C8952A;
      font-size: 1.4rem;
      letter-spacing: 3px;
    }
    .header-count {
      font-family: 'Special Elite', serif;
      color: #888;
      font-size: 0.85rem;
    }

    .toolbar {
      background: #f8f0d8;
      border-bottom: 3px solid #111;
      padding: 10px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .btn {
      font-family: 'Anton', sans-serif;
      font-style: italic;
      letter-spacing: 1px;
      border: 3px solid #111;
      cursor: pointer;
      padding: 7px 14px;
      font-size: 0.85rem;
      transition: transform 0.1s, box-shadow 0.1s;
      text-transform: uppercase;
    }
    .btn:hover  { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 #111; }
    .btn-gold   { background: #C8952A; color: #111; box-shadow: 3px 3px 0 #111; }
    .btn-purple { background: #4A3DC8; color: white; box-shadow: 3px 3px 0 #111; }
    .btn-red    { background: #8B2035; color: white; box-shadow: 3px 3px 0 #111; }
    .btn-plain  { background: #f0e6c8; color: #111; box-shadow: 2px 2px 0 #111; }

    .clips-grid {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
      align-content: start;
    }

    .clip-card {
      border: 4px solid #111;
      box-shadow: 5px 5px 0 #111;
      background: white;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .clip-card:hover {
      transform: translate(-2px,-2px);
      box-shadow: 7px 7px 0 #111;
    }
    .clip-card.selected {
      outline: 3px solid #C8952A;
      outline-offset: 3px;
    }

    .clip-thumb {
      height: 130px;
      background: linear-gradient(135deg, #1a1040, #4A3DC8);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .clip-thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .clip-play {
      position: absolute;
      width: 40px; height: 40px;
      background: #C8952A;
      border: 3px solid #111;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 3px 3px 0 #111;
      z-index: 2;
      font-size: 1rem;
    }
    .clip-date {
      position: absolute;
      bottom: 6px; right: 6px;
      background: rgba(0,0,0,0.7);
      color: white;
      font-family: 'Special Elite', serif;
      font-size: 0.7rem;
      padding: 2px 6px;
    }

    .clip-info {
      padding: 10px 12px;
      border-top: 3px solid #111;
    }
    .clip-name {
      font-family: 'Anton', sans-serif;
      font-style: italic;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .clip-meta {
      font-family: 'Special Elite', serif;
      font-size: 0.75rem;
      color: #888;
      display: flex;
      justify-content: space-between;
    }

    .clip-actions {
      padding: 8px 10px;
      border-top: 2px solid #eee;
      display: flex;
      gap: 6px;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      border: 4px dashed #ccc;
    }
    .empty-title {
      font-family: 'Anton', sans-serif;
      font-style: italic;
      font-size: 2rem;
      color: #ccc;
      display: block;
      margin-bottom: 8px;
    }
    .empty-sub {
      font-family: 'Special Elite', serif;
      color: #aaa;
    }

    .footer {
      background: #111;
      border-top: 3px solid #C8952A;
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-text { font-family: 'Special Elite', serif; color: #666; font-size: 0.75rem; }

    /* Upload status overlay */
    .uploading-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .uploading-overlay.show { display: flex; }
    .upload-box {
      background: white;
      border: 5px solid #111;
      box-shadow: 10px 10px 0 #111;
      padding: 32px 40px;
      text-align: center;
      min-width: 300px;
    }
    .upload-title {
      font-family: 'Anton', sans-serif;
      font-style: italic;
      font-size: 1.5rem;
      color: #4A3DC8;
      margin-bottom: 12px;
      letter-spacing: 2px;
    }
    .upload-bar-track {
      height: 20px;
      border: 3px solid #111;
      background: #f0e6c8;
      overflow: hidden;
      box-shadow: 3px 3px 0 #111;
    }
    .upload-bar-fill {
      height: 100%;
      background: repeating-linear-gradient(45deg, #4A3DC8 0, #4A3DC8 8px, #3a2fb8 8px, #3a2fb8 16px);
      transition: width 0.3s ease;
      width: 0%;
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="../../assets/logo-header.png" alt="ClipFury" style="width:28px;height:28px;border-radius:50%;border:2px solid #C8952A;margin-right:2px;" />
    <div class="header-title">CLIPFURY — MY CLIPS</div>
    <div class="header-count" id="clip-count">Loading...</div>
  </div>

  <div class="toolbar">
    <button class="btn btn-gold"   id="uploadSelected"  disabled>UPLOAD TO SNAPFURY</button>
    <button class="btn btn-purple" id="openFolder">OPEN FOLDER</button>
    <button class="btn btn-red"    id="deleteSelected"  disabled>DELETE</button>
    <div style="margin-left:auto;font-family:'Special Elite',serif;font-size:0.8rem;color:#888;" id="selected-info"></div>
  </div>

  <div class="clips-grid" id="clips-grid">
    <div class="empty-state">
      <span class="empty-title">LOADING...</span>
    </div>
  </div>

  <div class="footer">
    <span class="footer-text">Double-click a clip to play it · Select to upload or delete</span>
    <span class="footer-text" id="storage-info"></span>
  </div>

  <div class="uploading-overlay" id="uploading-overlay">
    <div class="upload-box">
      <div class="upload-title">UPLOADING...</div>
      <div class="upload-bar-track">
        <div class="upload-bar-fill" id="upload-bar"></div>
      </div>
      <div style="font-family:'Special Elite',serif;font-size:0.85rem;color:#888;margin-top:10px;" id="upload-status-text">Preparing...</div>
    </div>
  </div>

  <script>
    const { ipcRenderer, shell } = require("electron");
    const path = require("path");
    const fs   = require("fs");

    let clips = [];
    let selectedClip = null;

    function formatSize(bytes) {
      if (bytes > 1e9) return (bytes / 1e9).toFixed(1) + " GB";
      if (bytes > 1e6) return (bytes / 1e6).toFixed(1) + " MB";
      return (bytes / 1e3).toFixed(0) + " KB";
    }

    function formatDate(ms) {
      return new Date(ms).toLocaleDateString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
    }

    function render() {
      const grid     = document.getElementById("clips-grid");
      const countEl  = document.getElementById("clip-count");
      const storageEl = document.getElementById("storage-info");

      if (clips.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <span class="empty-title">NO CLIPS YET</span>
            <div class="empty-sub">Play Marvel Snap and snap to capture your first clip.</div>
          </div>`;
        countEl.textContent = "0 clips";
        storageEl.textContent = "";
        return;
      }

      const totalSize = clips.reduce((acc, c) => acc + c.size, 0);
      countEl.textContent = `${clips.length} clip${clips.length !== 1 ? "s" : ""}`;
      storageEl.textContent = `${formatSize(totalSize)} total`;

      grid.innerHTML = clips.map((clip, i) => `
        <div class="clip-card ${selectedClip === clip.path ? "selected" : ""}" data-path="${clip.path}" data-index="${i}">
          <div class="clip-thumb">
            <div class="clip-play">▶</div>
            <div class="clip-date">${formatDate(clip.created)}</div>
          </div>
          <div class="clip-info">
            <div class="clip-name" title="${clip.name}">${clip.name}</div>
            <div class="clip-meta">
              <span>${formatSize(clip.size)}</span>
              <span>${formatDate(clip.created)}</span>
            </div>
          </div>
        </div>
      `).join("");

      // Attach events
      grid.querySelectorAll(".clip-card").forEach(card => {
        card.addEventListener("click", () => selectClip(card.dataset.path));
        card.addEventListener("dblclick", () => shell.openPath(card.dataset.path));
      });
    }

    function selectClip(clipPath) {
      selectedClip = clipPath === selectedClip ? null : clipPath;
      const hasSelection = !!selectedClip;
      document.getElementById("uploadSelected").disabled  = !hasSelection;
      document.getElementById("deleteSelected").disabled  = !hasSelection;
      document.getElementById("selected-info").textContent = hasSelection
        ? `Selected: ${path.basename(selectedClip)}`
        : "";
      render();
    }

    async function loadClips() {
      clips = await ipcRenderer.invoke("get-clips");
      render();
    }

    document.getElementById("openFolder").addEventListener("click", () => {
      ipcRenderer.invoke("open-clips-dir");
    });

    document.getElementById("deleteSelected").addEventListener("click", async () => {
      if (!selectedClip) return;
      if (!confirm(`Delete ${path.basename(selectedClip)}?`)) return;
      await ipcRenderer.invoke("delete-clip", selectedClip);
      selectedClip = null;
      document.getElementById("uploadSelected").disabled = true;
      document.getElementById("deleteSelected").disabled = true;
      document.getElementById("selected-info").textContent = "";
      await loadClips();
    });

    document.getElementById("uploadSelected").addEventListener("click", async () => {
      if (!selectedClip) return;
      const overlay  = document.getElementById("uploading-overlay");
      const bar      = document.getElementById("upload-bar");
      const statusTx = document.getElementById("upload-status-text");

      overlay.classList.add("show");
      bar.style.width = "20%";
      statusTx.textContent = "Uploading to SnapFury...";

      // Simulate progress while actual upload runs
      let fakeProgress = 20;
      const progressInterval = setInterval(() => {
        if (fakeProgress < 85) { fakeProgress += 5; bar.style.width = fakeProgress + "%"; }
      }, 300);

      try {
        await ipcRenderer.invoke("upload-snapfury", selectedClip);
        clearInterval(progressInterval);
        bar.style.width = "100%";
        statusTx.textContent = "Uploaded!";
        setTimeout(() => overlay.classList.remove("show"), 1500);
      } catch (err) {
        clearInterval(progressInterval);
        overlay.classList.remove("show");
        alert("Upload failed: " + err.message);
      }
    });

    // Refresh when main process says clips updated
    ipcRenderer.on("clips-updated", loadClips);

    loadClips();
  </script>
</body>
</html>
