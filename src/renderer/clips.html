<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ClipFury — My Clips</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .header { background: #0f0f0f; border-bottom: 1px solid rgba(124,58,237,0.3); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 3px; background: linear-gradient(135deg, #fff, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header-count { font-size: 0.72rem; color: rgba(255,255,255,0.25); letter-spacing: 1px; }
    .toolbar { background: #0d0d0d; border-bottom: 1px solid rgba(255,255,255,0.06); padding: 10px 16px; display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .btn { font-family: 'Inter', sans-serif; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.5px; border: none; cursor: pointer; border-radius: 6px; padding: 7px 14px; transition: all 0.15s; text-transform: uppercase; }
    .btn-primary  { background: linear-gradient(135deg, #7c3aed, #6d28d9); color: white; box-shadow: 0 0 16px rgba(124,58,237,0.3); }
    .btn-primary:hover  { box-shadow: 0 0 24px rgba(124,58,237,0.5); transform: translateY(-1px); }
    .btn-secondary { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.08); }
    .btn-secondary:hover { background: rgba(255,255,255,0.09); color: white; }
    .btn-danger { background: rgba(220,38,38,0.12); color: #f87171; border: 1px solid rgba(220,38,38,0.2); }
    .btn-danger:hover { background: rgba(220,38,38,0.2); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    .selected-info { margin-left: auto; font-size: 0.72rem; color: rgba(255,255,255,0.3); font-style: italic; }
    .clips-grid { flex: 1; overflow-y: auto; padding: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; align-content: start; scrollbar-width: thin; scrollbar-color: #7c3aed #0a0a0a; }
    .clips-grid::-webkit-scrollbar { width: 3px; }
    .clips-grid::-webkit-scrollbar-thumb { background: #7c3aed; border-radius: 2px; }
    .clip-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; cursor: pointer; overflow: hidden; transition: all 0.2s; }
    .clip-card:hover { border-color: rgba(124,58,237,0.4); background: rgba(124,58,237,0.05); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .clip-card.selected { border-color: #7c3aed; box-shadow: 0 0 0 1px #7c3aed, 0 8px 24px rgba(124,58,237,0.2); }
    .clip-thumb { height: 120px; background: linear-gradient(135deg, #0f0820, #1a0a40); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .clip-thumb::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at center, rgba(124,58,237,0.15) 0%, transparent 70%); }
    .play-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(124,58,237,0.8); border: 1px solid rgba(124,58,237,0.5); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(124,58,237,0.4); position: relative; z-index: 2; }
    .play-icon { width: 0; height: 0; border-top: 7px solid transparent; border-bottom: 7px solid transparent; border-left: 12px solid white; margin-left: 2px; }
    .clip-date { position: absolute; bottom: 6px; right: 8px; font-size: 0.65rem; color: rgba(255,255,255,0.3); background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 4px; z-index: 2; }
    .clip-info { padding: 10px 12px; }
    .clip-name { font-size: 0.8rem; font-weight: 600; color: rgba(255,255,255,0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
    .clip-meta { font-size: 0.7rem; color: rgba(255,255,255,0.3); display: flex; justify-content: space-between; }
    .empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 20px; }
    .empty-title { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 3px; background: linear-gradient(135deg, rgba(124,58,237,0.5), rgba(124,58,237,0.2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: block; margin-bottom: 10px; }
    .empty-sub { font-size: 0.85rem; color: rgba(255,255,255,0.25); line-height: 1.6; }
    .footer { background: #0f0f0f; border-top: 1px solid rgba(255,255,255,0.06); padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .footer-text { font-size: 0.68rem; color: rgba(255,255,255,0.2); letter-spacing: 0.5px; }
    .upload-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 100; align-items: center; justify-content: center; }
    .upload-overlay.show { display: flex; }
    .upload-box { background: #111; border: 1px solid rgba(124,58,237,0.3); border-radius: 12px; padding: 32px 40px; text-align: center; min-width: 300px; box-shadow: 0 0 60px rgba(124,58,237,0.2); }
    .upload-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 3px; background: linear-gradient(135deg, #fff, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
    .upload-bar-track { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; margin-bottom: 12px; }
    .upload-bar-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #a78bfa); border-radius: 2px; transition: width 0.3s ease; width: 0%; }
    .upload-status-text { font-size: 0.78rem; color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <img src="../../assets/logo-header.png" alt="ClipFury" style="width:28px;height:28px;border-radius:50%;border:1px solid rgba(124,58,237,0.5);" />
      <div class="header-logo">CLIPFURY</div>
      <span style="color:rgba(255,255,255,0.15);font-size:0.75rem;">—</span>
      <span style="font-size:0.78rem;color:rgba(255,255,255,0.35);font-weight:500;">MY CLIPS</span>
    </div>
    <div class="header-count" id="clip-count">Loading...</div>
  </div>

  <div class="toolbar">
    <button class="btn btn-primary"   id="uploadSelected" disabled>Upload to SnapFury</button>
    <button class="btn btn-secondary" id="openFolder">Open Folder</button>
    <button class="btn btn-danger"    id="deleteSelected" disabled>Delete</button>
    <div class="selected-info" id="selected-info"></div>
  </div>

  <div class="clips-grid" id="clips-grid">
    <div class="empty-state">
      <span class="empty-title">LOADING...</span>
    </div>
  </div>

  <div class="footer">
    <span class="footer-text">Double-click to open · Select to upload or delete</span>
    <span class="footer-text" id="storage-info"></span>
  </div>

  <div class="upload-overlay" id="upload-overlay">
    <div class="upload-box">
      <div class="upload-title">UPLOADING</div>
      <div class="upload-bar-track"><div class="upload-bar-fill" id="upload-bar"></div></div>
      <div class="upload-status-text" id="upload-status-text">Preparing...</div>
    </div>
  </div>

  <script>
    const { ipcRenderer, shell } = require("electron");
    const path = require("path");
    const fs   = require("fs");

    let clips = [];
    let selectedClip = null;

    function formatSize(bytes) {
      if (bytes > 1e9) return (bytes/1e9).toFixed(1)+" GB";
      if (bytes > 1e6) return (bytes/1e6).toFixed(1)+" MB";
      return (bytes/1e3).toFixed(0)+" KB";
    }
    function formatDate(ms) {
      return new Date(ms).toLocaleDateString("en-US", { month:"short", day:"numeric", hour:"2-digit", minute:"2-digit" });
    }

    function render() {
      const grid      = document.getElementById("clips-grid");
      const countEl   = document.getElementById("clip-count");
      const storageEl = document.getElementById("storage-info");

      if (clips.length === 0) {
        grid.innerHTML = `<div class="empty-state"><span class="empty-title">NO CLIPS YET</span><div class="empty-sub">Play Marvel Snap and snap to capture your first clip.<br>Clips appear here automatically.</div></div>`;
        countEl.textContent = "0 clips";
        storageEl.textContent = "";
        return;
      }

      const totalSize = clips.reduce((a, c) => a + c.size, 0);
      countEl.textContent = `${clips.length} clip${clips.length !== 1 ? "s" : ""}`;
      storageEl.textContent = formatSize(totalSize) + " total";

      grid.innerHTML = clips.map((clip, i) => `
        <div class="clip-card ${selectedClip === clip.path ? "selected" : ""}" data-path="${clip.path}" data-index="${i}">
          <div class="clip-thumb">
            <div class="play-btn"><div class="play-icon"></div></div>
            <div class="clip-date">${formatDate(clip.created)}</div>
          </div>
          <div class="clip-info">
            <div class="clip-name" title="${clip.name}">${clip.name}</div>
            <div class="clip-meta"><span>${formatSize(clip.size)}</span><span>${formatDate(clip.created)}</span></div>
          </div>
        </div>
      `).join("");

      grid.querySelectorAll(".clip-card").forEach(card => {
        card.addEventListener("click",    () => selectClip(card.dataset.path));
        card.addEventListener("dblclick", () => shell.openPath(card.dataset.path));
      });
    }

    function selectClip(clipPath) {
      selectedClip = clipPath === selectedClip ? null : clipPath;
      const has = !!selectedClip;
      document.getElementById("uploadSelected").disabled  = !has;
      document.getElementById("deleteSelected").disabled  = !has;
      document.getElementById("selected-info").textContent = has ? path.basename(selectedClip) : "";
      render();
    }

    async function loadClips() {
      clips = await ipcRenderer.invoke("get-clips");
      render();
    }

    document.getElementById("openFolder").addEventListener("click", () => ipcRenderer.invoke("open-clips-dir"));

    document.getElementById("deleteSelected").addEventListener("click", async () => {
      if (!selectedClip) return;
      if (!confirm(`Delete ${path.basename(selectedClip)}?`)) return;
      await ipcRenderer.invoke("delete-clip", selectedClip);
      selectedClip = null;
      document.getElementById("uploadSelected").disabled = true;
      document.getElementById("deleteSelected").disabled = true;
      document.getElementById("selected-info").textContent = "";
      await loadClips();
    });

    document.getElementById("uploadSelected").addEventListener("click", async () => {
      if (!selectedClip) return;
      const overlay  = document.getElementById("upload-overlay");
      const bar      = document.getElementById("upload-bar");
      const statusTx = document.getElementById("upload-status-text");
      overlay.classList.add("show");
      bar.style.width = "15%";
      statusTx.textContent = "Uploading to SnapFury...";
      let progress = 15;
      const interval = setInterval(() => { if (progress < 85) { progress += 4; bar.style.width = progress + "%"; } }, 300);
      try {
        await ipcRenderer.invoke("upload-snapfury", selectedClip);
        clearInterval(interval);
        bar.style.width = "100%";
        statusTx.textContent = "Upload complete!";
        setTimeout(() => overlay.classList.remove("show"), 1500);
      } catch (err) {
        clearInterval(interval);
        overlay.classList.remove("show");
        alert("Upload failed: " + err.message);
      }
    });

    ipcRenderer.on("clips-updated", loadClips);
    loadClips();
  </script>
</body>
</html>
